            - heading "The same idea, different worlds" [level=2] [ref=e607]
            - generic [ref=e608]:
              - generic [ref=e609]:
                - generic [ref=e610]: 🚗
                - generic [ref=e611]: Real-world example
                - generic [ref=e612]: Car navigation
              - paragraph [ref=e614]: "A satnav models the road network as a weighted graph: junctions are vertices, roads are edges weighted by drive time. Dijkstra from your current junction finalises nearby junctions first and fans outward, so the moment it finalises your destination it already holds the fastest route — which it rebuilds by following parent pointers back to you."
            - generic [ref=e615]:
              - generic [ref=e616]:
                - generic [ref=e617]: 🌐
                - generic [ref=e618]: Real-world example
                - generic [ref=e619]: Internet routing
              - paragraph [ref=e621]: Link-state protocols such as OSPF give every network link a numeric cost. Each router runs Dijkstra over its map of the whole area to compute the least-cost path to every other router, then forwards each packet onto the first hop of that shortest path. Recompute when a link changes, and traffic re-routes automatically.
            - generic [ref=e622]:
              - generic [ref=e623]:
                - generic [ref=e624]: ✈️
                - generic [ref=e625]: Real-world example
                - generic [ref=e626]: Flight booking
              - paragraph [ref=e628]:
                - text: Searching for the cheapest multi-leg itinerary is a shortest-path problem where vertices are airports, edges are flights, and weights are fares. Dijkstra from your origin finds the lowest total fare to your destination — possibly via two cheap connecting legs that beat a single pricey direct flight, exactly like
                - code [ref=e629]: A→C→B→D
                - text: beat the direct edge above.
            - generic [ref=e630]:
              - generic [ref=e631]:
                - generic [ref=e632]: 📞
                - generic [ref=e633]: Real-world example
                - generic [ref=e634]: Telecom call routing
              - paragraph [ref=e636]: A phone carrier routing a call across its network picks the least-cost path through switching centres, where each trunk between centres carries a per-minute cost. Dijkstra finds the cheapest route to connect the call, and because tariffs are never negative the greedy “closest first” rule is exactly what is needed.
            - heading "Common pitfalls & interview tips" [level=2] [ref=e637]
            - list [ref=e638]:
              - listitem [ref=e639]:
                - strong [ref=e640]: Running Dijkstra with negative weights.
                - text: A negative edge can make an already-finalised vertex improvable later, silently producing wrong distances. If any weight can be negative, reach for Bellman-Ford instead.
              - listitem [ref=e641]:
                - strong [ref=e642]: Forgetting the stale-entry skip.
                - text: Because we push a
                - emphasis [ref=e643]: new
                - text: entry on every improvement rather than decreasing a key in place, the same vertex appears in the queue several times. Skip it (via the
                - code [ref=e644]: visited
                - text: check) when you pop one already finalised, or you will relax from outdated distances.
              - listitem [ref=e645]:
                - strong [ref=e646]:
                  - text: Updating
                  - code [ref=e647]: dist
                  - text: but not pushing to the queue.
                - text: Every time you lower
                - code [ref=e648]: dist[v]
                - text: you must enqueue the new
                - code [ref=e649]: (v, dist[v])
                - text: ", otherwise the improvement never gets a chance to be popped and propagated."
              - listitem [ref=e650]:
                - strong [ref=e651]: Confusing Dijkstra with MST.
                - text: Both are greedy, but Prim grows a tree by cheapest
                - emphasis [ref=e652]: connecting edge
                - text: while Dijkstra grows paths by cheapest
                - emphasis [ref=e653]: distance from the source
                - text: . They generally produce different trees.
