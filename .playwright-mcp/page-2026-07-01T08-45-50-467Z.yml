              - code [ref=e344]: "// Dijkstra with a tiny array-based \"pop the smallest\" priority queue. function dijkstra(graph, source) { const dist = {}; for (const v in graph) dist[v] = Infinity; dist[source] = 0; const pq = [{ node: source, d: 0 }]; const visited = {}; while (pq.length) { // find and remove the queue entry with the smallest distance let best = 0; for (let i = 1; i < pq.length; i++) if (pq[i].d < pq[best].d) best = i; const cur = pq.splice(best, 1)[0]; if (visited[cur.node]) continue; // skip a stale entry visited[cur.node] = true; // cur.node is now final for (const edge of graph[cur.node]) { const nd = dist[cur.node] + edge.w; // relax edge cur.node -> edge.v if (nd < dist[edge.v]) { dist[edge.v] = nd; pq.push({ node: edge.v, d: nd }); } } } return dist; } // undirected weighted graph (A-B:4, A-C:2, B-C:1, B-D:5, C-D:8, C-E:10, D-E:2) const graph = { A: [{ v: 'B', w: 4 }, { v: 'C', w: 2 }], B: [{ v: 'A', w: 4 }, { v: 'C', w: 1 }, { v: 'D', w: 5 }], C: [{ v: 'A', w: 2 }, { v: 'B', w: 1 }, { v: 'D', w: 8 }, { v: 'E', w: 10 }], D: [{ v: 'B', w: 5 }, { v: 'C', w: 8 }, { v: 'E', w: 2 }], E: [{ v: 'C', w: 10 }, { v: 'D', w: 2 }], };"
