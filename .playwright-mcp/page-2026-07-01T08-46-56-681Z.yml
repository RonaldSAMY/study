              - code [ref=f1e718]: "// 0/1 knapsack: each item used at most once. Returns the max value. function knapsack01(weights, values, capacity) { const n = weights.length; // dp[i][w] = best value using first i items with capacity w const dp = Array.from({ length: n + 1 }, () => new Array(capacity + 1).fill(0)); for (let i = 1; i <= n; i++) { const weight = weights[i - 1]; const value = values[i - 1]; for (let w = 0; w <= capacity; w++) { dp[i][w] = dp[i - 1][w]; // skip item i if (weight <= w) { // or take it, if it fits dp[i][w] = Math.max(dp[i][w], dp[i - 1][w - weight] + value); } } } return dp[n][capacity]; }"
