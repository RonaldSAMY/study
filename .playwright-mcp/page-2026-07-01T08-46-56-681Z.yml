                - generic [ref=f1e1009]: Advertising
              - paragraph [ref=f1e1011]: A campaign has one fixed media budget and a slate of placements, each costing a set amount and projected to drive a set number of conversions. Each placement is bought once or skipped — maximize conversions under the budget cap.
