# Static-site server for the Astro build (output: 'static').
server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---- Compression ----
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/xml application/rss+xml
        image/svg+xml font/woff font/woff2 application/font-woff;

    # ---- Security headers ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ---- Long-lived, immutable caching for hashed Astro assets ----
    # `^~` so this prefix wins over the regex asset block below.
    location ^~ /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Other static assets (fonts/images) — cache a week.
    location ~* \.(?:js|css|woff2?|ttf|eot|png|jpe?g|gif|svg|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    # ---- HTML / pages: serve directory index files directly (no trailing-
    # slash 301), fall back to Astro's 404 page. Astro's default build format
    # emits /page/index.html, so serve $uri/index.html without a redirect. ----
    location / {
        # Don't cache HTML so deploys are picked up immediately.
        add_header Cache-Control "no-cache";
        try_files $uri $uri.html $uri/index.html =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
